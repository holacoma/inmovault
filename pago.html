<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout · InmoVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --verde-profundo:#0F3D2E;--verde-suave:#1B5440;--dorado:#C9A368;
    --dorado-suave:#E8D5B0;--crema:#FAF7F0;--grafito:#1A1A1A;--gris-texto:#5C5750;--linea:#E5DFD2;
    --error:#B5443A;--success:#2D7A4F;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Inter',sans-serif;background:var(--crema);color:var(--grafito);-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:'Fraunces',serif;}

  /* CHECKOUT NAV */
  .checkout-nav{
    background:#fff;border-bottom:1px solid var(--linea);
    padding:16px 48px;display:flex;align-items:center;justify-content:space-between;
  }
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
  .logo-mark{width:32px;height:32px;border-radius:7px;background:var(--verde-profundo);display:flex;align-items:center;justify-content:center;color:var(--dorado);font-family:'Fraunces',serif;font-weight:700;font-size:16px;}
  .logo-text{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:-0.02em;color:var(--grafito);}
  .logo-text span{color:var(--dorado);}
  .secure-badge{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--gris-texto);font-weight:500;}
  .secure-badge svg{color:var(--verde-profundo);}
  .back-link{font-size:13.5px;font-weight:600;color:var(--verde-profundo);text-decoration:none;display:flex;align-items:center;gap:5px;}
  .back-link:hover{color:var(--dorado);}

  /* MAIN LAYOUT */
  .checkout-body{
    max-width:1100px;margin:0 auto;padding:40px 24px 80px;
    display:grid;grid-template-columns:1fr 400px;gap:48px;align-items:start;
  }

  /* FORM COLUMN */
  .form-col{}
  .form-section{background:#fff;border:1px solid var(--linea);border-radius:16px;padding:28px;margin-bottom:20px;}
  .form-section-title{font-size:15px;font-weight:700;color:var(--grafito);margin-bottom:22px;display:flex;align-items:center;gap:10px;}
  .step-num{width:26px;height:26px;border-radius:50%;background:var(--verde-profundo);color:var(--dorado);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .field-row.full{grid-template-columns:1fr;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:13px;font-weight:600;color:var(--grafito);}
  .field input,.field select,.field textarea{
    padding:12px 14px;border:1.5px solid var(--linea);border-radius:9px;
    font-family:'Inter',sans-serif;font-size:14.5px;color:var(--grafito);
    background:#fff;transition:border-color 0.15s,box-shadow 0.15s;outline:none;
    -webkit-appearance:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    border-color:var(--verde-profundo);box-shadow:0 0 0 3px rgba(15,61,46,0.08);
  }
  .field input.error{border-color:var(--error);}
  .field-hint{font-size:11.5px;color:var(--gris-texto);}
  .card-row{display:grid;grid-template-columns:1fr 120px 90px;gap:12px;margin-bottom:16px;}
  .card-input-wrap{position:relative;}
  .card-input-wrap input{padding-right:50px;}
  .card-type{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--gris-texto);opacity:0.6;}

  /* SUBMIT */
  .submit-btn{
    width:100%;padding:16px;border-radius:10px;
    background:var(--verde-profundo);color:#fff;
    font-family:'Inter',sans-serif;font-size:16px;font-weight:700;
    border:none;cursor:pointer;transition:background 0.2s;
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:4px;
  }
  .submit-btn:hover{background:var(--verde-suave);}
  .submit-btn:disabled{opacity:0.6;cursor:not-allowed;}
  .submit-btn.loading::after{
    content:"";width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;
  }
  .security-note{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:16px;font-size:12px;color:var(--gris-texto);}
  .security-note span{display:flex;align-items:center;gap:5px;}
  .demo-notice{background:#FEF9EC;border:1px solid #F0E4AC;border-radius:10px;padding:12px 16px;font-size:12.5px;color:#7A6520;margin-top:16px;text-align:center;line-height:1.5;}

  /* ORDER SUMMARY */
  .summary-col{position:sticky;top:24px;}
  .summary-box{background:#fff;border:1px solid var(--linea);border-radius:16px;overflow:hidden;}
  .summary-header{background:var(--verde-profundo);padding:20px 24px;}
  .summary-plan-name{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--crema);}
  .summary-plan-tag{display:inline-block;background:var(--dorado);color:var(--verde-profundo);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:8px;letter-spacing:0.03em;vertical-align:middle;}
  .summary-plan-desc{color:#B8C0B0;font-size:13px;margin-top:6px;}
  .summary-body{padding:22px 24px;}
  .summary-features{display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
  .summary-feature{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:var(--grafito);}
  .summary-check{color:var(--verde-profundo);font-weight:700;flex-shrink:0;margin-top:1px;}
  .summary-divider{height:1px;background:var(--linea);margin:18px 0;}
  .summary-price-row{display:flex;justify-content:space-between;font-size:14px;color:var(--gris-texto);margin-bottom:8px;}
  .summary-price-row.total{font-size:16px;font-weight:700;color:var(--grafito);}
  .summary-trial{background:var(--crema);border-radius:10px;padding:14px;margin-top:16px;text-align:center;}
  .summary-trial strong{display:block;font-size:14px;color:var(--verde-profundo);margin-bottom:4px;}
  .summary-trial span{font-size:12.5px;color:var(--gris-texto);}
  .trust-row{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
  .trust-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--gris-texto);}
  .trust-icon{font-size:14px;}

  /* MOBILE SUMMARY TOGGLE */
  .mobile-summary-bar{
    display:none;background:#fff;border:1px solid var(--linea);border-radius:12px;
    padding:14px 18px;margin-bottom:20px;cursor:pointer;
    justify-content:space-between;align-items:center;
  }
  .mobile-summary-bar:hover{border-color:var(--verde-profundo);}
  .mobile-summary-bar .plan-name{font-weight:700;font-size:14px;color:var(--verde-profundo);}
  .mobile-summary-bar .plan-price{font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:var(--verde-profundo);}
  .mobile-summary-bar .toggle-arrow{font-size:18px;color:var(--gris-texto);transition:transform 0.2s;}
  .mobile-summary-bar.open .toggle-arrow{transform:rotate(180deg);}
  .mobile-summary-panel{display:none;background:#fff;border:1px solid var(--linea);border-top:none;border-radius:0 0 12px 12px;padding:16px 18px;margin-top:-20px;margin-bottom:20px;}
  .mobile-summary-panel.open{display:block;}

  /* SUCCESS STATE */
  .success-screen{
    display:none;text-align:center;padding:60px 32px;
    max-width:520px;margin:0 auto;
  }
  .success-screen.visible{display:block;}
  .success-icon{width:72px;height:72px;background:#EDF4F0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;}
  .success-screen h2{font-size:28px;color:var(--verde-profundo);margin-bottom:12px;}
  .success-screen p{font-size:16px;color:var(--gris-texto);line-height:1.6;margin-bottom:28px;}
  .success-steps{background:#fff;border:1px solid var(--linea);border-radius:14px;padding:22px;text-align:left;margin-bottom:28px;}
  .success-steps h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--dorado);margin-bottom:14px;}
  .success-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;font-size:14px;color:var(--grafito);}
  .success-step:last-child{margin-bottom:0;}
  .success-step-num{width:24px;height:24px;border-radius:50%;background:var(--verde-profundo);color:var(--dorado);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .btn-back-home{display:inline-block;background:var(--verde-profundo);color:#fff;padding:14px 32px;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;transition:background 0.2s;}
  .btn-back-home:hover{background:var(--verde-suave);}

  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:860px){
    .checkout-nav{padding:14px 20px;}
    .checkout-body{grid-template-columns:1fr;padding:24px 16px 60px;}
    .summary-col{display:none;}
    .mobile-summary-bar{display:flex;}
  }
  @media(max-width:520px){
    .field-row{grid-template-columns:1fr;}
    .card-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
    .card-row .card-input-wrap{grid-column:1/-1;}
    .security-note{flex-direction:column;gap:8px;}
    .checkout-body{padding:16px 12px 60px;}
    .form-card{padding:20px 16px;}
    .step-title{font-size:18px;}
    .btn-submit{font-size:15px;}
    .mobile-summary-bar{padding:12px 16px;}
  }
</style>
</head>
<body>

<!-- CHECKOUT NAV -->
<nav class="checkout-nav">
  <a href="index.html" class="logo">
    <div class="logo-mark">V</div>
    <div class="logo-text">Inmo<span>Vault</span></div>
  </a>
  <div class="secure-badge">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Pago 100% seguro
  </div>
</nav>

<!-- MAIN -->
<div class="checkout-body" id="checkoutBody">

  <!-- MOBILE SUMMARY BAR -->
  <div class="mobile-summary-bar" id="mobileSummaryBar" onclick="toggleMobileSummary()" style="display:none;">
    <div>
      <div class="plan-name" id="mobilePlanName">—</div>
      <div style="font-size:12px;color:var(--gris-texto);">Ver resumen del pedido ▾</div>
    </div>
    <div class="plan-price" id="mobilePlanPrice">—</div>
    <div class="toggle-arrow">▾</div>
  </div>
  <div class="mobile-summary-panel" id="mobileSummaryPanel"></div>

  <!-- FORM COLUMN -->
  <div class="form-col" id="formCol">
    <div style="margin-bottom:20px;">
      <a href="precios.html" class="back-link">← Cambiar plan</a>
    </div>
    <div id="formTitle" style="margin-bottom:24px;">
      <h2 style="font-size:26px;color:var(--verde-profundo);margin-bottom:6px;"></h2>
      <p style="font-size:14.5px;color:var(--gris-texto);"></p>
    </div>
    <div id="formContent"></div>
  </div>

  <!-- ORDER SUMMARY (desktop) -->
  <div class="summary-col" id="summaryCol">
    <div class="summary-box" id="summaryBox"></div>
  </div>
</div>

<!-- SUCCESS STATE -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✓</div>
  <h2 id="successTitle">¡Listo para empezar!</h2>
  <p id="successMsg"></p>
  <div class="success-steps">
    <h4>Próximos pasos</h4>
    <div id="successSteps"></div>
  </div>
  <a href="index.html" class="btn-back-home">Volver al inicio</a>
</div>

<script>
const params = new URLSearchParams(location.search);
const planKey  = (params.get('plan') || 'pro').toLowerCase();
const billing  = params.get('billing') === 'anual' ? 'anual' : 'mensual';

const PLANS = {
  basico: {
    name: 'Básico', tag: null, contact: false,
    price: billing === 'anual' ? 119 : 149,
    period: billing === 'anual' ? '/mes · facturado anualmente' : '/mes',
    desc: 'Catálogo digital con tu marca y gestión simple de contactos.',
    features: ['Hasta 100 propiedades','App con tu logo y colores','Panel de leads básico','Soporte por correo'],
    trial: true
  },
  pro: {
    name: 'Pro', tag: 'RECOMENDADO', contact: false,
    price: billing === 'anual' ? 319 : 399,
    period: billing === 'anual' ? '/mes · facturado anualmente' : '/mes',
    desc: 'Todo lo necesario para captar al comprador en el exterior.',
    features: ['Propiedades ilimitadas','Tours virtuales 360°','Reportes de verificación legal','CRM completo + WhatsApp','Soporte prioritario'],
    trial: true
  },
  enterprise: {
    name: 'Enterprise', tag: null, contact: true,
    price: null, period: 'contrato anual',
    desc: 'Para inmobiliarias con varias sucursales o marcas propias.',
    features: ['Multi-sucursal y multi-agente','App propia en App Store / Google Play','Integraciones personalizadas','Gerente de cuenta dedicado'],
    trial: false
  }
};

const plan = PLANS[planKey] || PLANS.pro;
document.title = `Activar plan ${plan.name} · InmoVault`;

// ── Render summary HTML ───────────────────────────────────────────────────────
function buildSummaryHTML() {
  const tagHtml = plan.tag ? `<span class="summary-plan-tag">${plan.tag}</span>` : '';
  const featuresHtml = plan.features.map(f =>
    `<div class="summary-feature"><span class="summary-check">✓</span> ${f}</div>`
  ).join('');
  const priceHtml = plan.price
    ? `<div class="summary-price-row"><span>Plan ${plan.name}</span><span>$${plan.price}${plan.period}</span></div>
       <div class="summary-price-row"><span>IVA / impuestos</span><span>Incluidos</span></div>
       <div class="summary-divider"></div>
       <div class="summary-price-row total"><span>Total hoy</span><span>${plan.trial ? '$0.00' : '$'+plan.price}</span></div>`
    : `<div class="summary-price-row total"><span>Precio</span><span>A medida</span></div>`;
  const trialHtml = plan.trial
    ? `<div class="summary-trial"><strong>✓ 14 días gratis</strong><span>Se te cobrará $${plan.price}${plan.period} después del período de prueba. Cancela cuando quieras.</span></div>`
    : '';
  return `
    <div class="summary-header">
      <div class="summary-plan-name">Plan ${plan.name}${tagHtml}</div>
      <div class="summary-plan-desc">${plan.desc}</div>
    </div>
    <div class="summary-body">
      <div class="summary-features">${featuresHtml}</div>
      <div class="summary-divider"></div>
      ${priceHtml}
      ${trialHtml}
      <div class="trust-row">
        <div class="trust-item"><span class="trust-icon">🔒</span> Conexión SSL cifrada</div>
        <div class="trust-item"><span class="trust-icon">↩️</span> Cancela en cualquier momento</div>
        <div class="trust-item"><span class="trust-icon">🛡️</span> Datos protegidos · nunca se comparten</div>
      </div>
    </div>`;
}

// ── Render form ───────────────────────────────────────────────────────────────
function renderPage() {
  // Page header
  const titleEl = document.querySelector('#formTitle h2');
  const subEl   = document.querySelector('#formTitle p');
  if (plan.contact) {
    titleEl.textContent = 'Cuéntanos sobre tu inmobiliaria';
    subEl.textContent   = 'Un miembro del equipo te contactará en menos de 24 horas con una propuesta personalizada.';
  } else {
    titleEl.textContent = `Activar plan ${plan.name}`;
    subEl.textContent   = plan.trial
      ? '14 días gratis, sin tarjeta requerida. Completa los datos para crear tu cuenta.'
      : 'Completa los datos para activar tu plan.';
  }

  // Summary
  document.getElementById('summaryBox').innerHTML = buildSummaryHTML();

  // Mobile summary
  document.getElementById('mobileSummaryBar').style.display = 'flex';
  document.getElementById('mobilePlanName').textContent  = `Plan ${plan.name}`;
  document.getElementById('mobilePlanPrice').textContent = plan.price ? `$${plan.price}` : 'A medida';
  document.getElementById('mobileSummaryPanel').innerHTML = buildSummaryHTML();

  // Form content
  if (plan.contact) {
    renderContactForm();
  } else {
    renderPaymentForm();
  }
}

function renderPaymentForm() {
  document.getElementById('formContent').innerHTML = `
    <form id="mainForm" onsubmit="handleSubmit(event)" novalidate>
      <!-- Step 1: Account -->
      <div class="form-section">
        <div class="form-section-title">
          <div class="step-num">1</div>
          Datos de tu cuenta
        </div>
        <div class="field-row">
          <div class="field">
            <label for="fname">Nombre completo *</label>
            <input type="text" id="fname" placeholder="Ej. María Fernanda García" autocomplete="name">
          </div>
          <div class="field">
            <label for="femail">Correo electrónico *</label>
            <input type="email" id="femail" placeholder="tu@inmobiliaria.com" autocomplete="email">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="fcompany">Nombre de la inmobiliaria *</label>
            <input type="text" id="fcompany" placeholder="Ej. Inmobiliaria Caracas" autocomplete="organization">
          </div>
          <div class="field">
            <label for="fcountry">País</label>
            <select id="fcountry" autocomplete="country">
              <option value="">Seleccionar país</option>
              <option value="ve" selected>Venezuela</option>
              <option value="us">Estados Unidos</option>
              <option value="es">España</option>
              <option value="co">Colombia</option>
              <option value="pa">Panamá</option>
              <option value="mx">México</option>
              <option value="ar">Argentina</option>
              <option value="other">Otro</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Step 2: Payment -->
      <div class="form-section">
        <div class="form-section-title">
          <div class="step-num">2</div>
          Método de pago
          <span style="font-size:11px;font-weight:500;color:var(--gris-texto);margin-left:auto;">${plan.trial ? 'No se cobra durante la prueba' : ''}</span>
        </div>
        <div class="field-row full">
          <div class="field">
            <label for="fcardnum">Número de tarjeta *</label>
            <div class="card-input-wrap">
              <input type="text" id="fcardnum" placeholder="1234 5678 9012 3456" maxlength="19" inputmode="numeric" autocomplete="cc-number" oninput="formatCard(this)">
              <span class="card-type" id="cardType"></span>
            </div>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="fexpiry">Vencimiento (MM/AA) *</label>
            <input type="text" id="fexpiry" placeholder="MM/AA" maxlength="5" inputmode="numeric" autocomplete="cc-exp" oninput="formatExpiry(this)">
          </div>
          <div class="field">
            <label for="fcvc">CVC *</label>
            <input type="text" id="fcvc" placeholder="123" maxlength="4" inputmode="numeric" autocomplete="cc-csc">
            <span class="field-hint">3 o 4 dígitos al dorso de la tarjeta</span>
          </div>
        </div>
        <div class="field-row full">
          <div class="field">
            <label for="fcardname">Nombre en la tarjeta *</label>
            <input type="text" id="fcardname" placeholder="Como aparece en la tarjeta" autocomplete="cc-name">
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        ${plan.trial ? `Activar prueba gratuita · Plan ${plan.name}` : `Pagar $${plan.price} · Activar plan ${plan.name}`}
      </button>
      <div class="security-note">
        <span>🔒 SSL cifrado</span>
        <span>🛡️ PCI DSS</span>
        <span>↩️ Cancela cuando quieras</span>
      </div>
      <div class="demo-notice">⚠️ Entorno de demostración · Los datos ingresados no son procesados ni almacenados.</div>
    </form>`;
}

function renderContactForm() {
  document.getElementById('formContent').innerHTML = `
    <form id="mainForm" onsubmit="handleSubmit(event)" novalidate>
      <div class="form-section">
        <div class="form-section-title">
          <div class="step-num">1</div>
          Tu información
        </div>
        <div class="field-row">
          <div class="field">
            <label for="fname">Nombre completo *</label>
            <input type="text" id="fname" placeholder="Tu nombre" autocomplete="name">
          </div>
          <div class="field">
            <label for="femail">Correo electrónico *</label>
            <input type="email" id="femail" placeholder="tu@inmobiliaria.com" autocomplete="email">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="fcompany">Nombre de la inmobiliaria *</label>
            <input type="text" id="fcompany" placeholder="Ej. Grupo Inmobiliario XYZ" autocomplete="organization">
          </div>
          <div class="field">
            <label for="fcountry">País *</label>
            <select id="fcountry">
              <option value="">Seleccionar</option>
              <option value="ve" selected>Venezuela</option>
              <option value="us">Estados Unidos</option>
              <option value="es">España</option>
              <option value="co">Colombia</option>
              <option value="pa">Panamá</option>
              <option value="other">Otro</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="fagents">Número de agentes aproximado</label>
            <select id="fagents">
              <option value="">Seleccionar</option>
              <option>Menos de 5</option>
              <option>5 – 20</option>
              <option>21 – 50</option>
              <option>Más de 50</option>
            </select>
          </div>
          <div class="field">
            <label for="fphone">Teléfono (WhatsApp)</label>
            <input type="tel" id="fphone" placeholder="+58 412 555 0000" autocomplete="tel">
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">
          <div class="step-num">2</div>
          Cuéntanos tu caso
        </div>
        <div class="field-row full">
          <div class="field">
            <label for="fmessage">¿Qué necesitas de InmoVault? (opcional)</label>
            <textarea id="fmessage" rows="4" placeholder="Ej. Tenemos 3 sucursales en Caracas y necesitamos una app con nuestra marca para 40 agentes..." style="resize:vertical;"></textarea>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Enviar solicitud → Nos contactamos en &lt;24h</button>
      <div class="demo-notice">⚠️ Entorno de demostración · Los datos ingresados no son procesados ni almacenados.</div>
    </form>`;
}

// ── Form helpers ──────────────────────────────────────────────────────────────
function formatCard(el) {
  let v = el.value.replace(/\D/g, '').substring(0, 16);
  el.value = v.replace(/(.{4})/g, '$1 ').trim();
  const type = document.getElementById('cardType');
  if (type) type.textContent = v[0] === '4' ? 'VISA' : v[0] === '5' ? 'MC' : v.startsWith('34') || v.startsWith('37') ? 'AMEX' : '';
}
function formatExpiry(el) {
  let v = el.value.replace(/\D/g, '').substring(0, 4);
  el.value = v.length > 2 ? v.substring(0, 2) + '/' + v.substring(2) : v;
}

// ── Submit handler ────────────────────────────────────────────────────────────
function handleSubmit(e) {
  e.preventDefault();

  // Basic validation: required fields
  const required = e.target.querySelectorAll('input[id^="f"]:not([id="fphone"]):not([id="fmessage"]), select[id="fcountry"], select[id="fagents"]');
  let valid = true;
  e.target.querySelectorAll('input,select,textarea').forEach(el => el.classList.remove('error'));

  ['fname','femail','fcompany','fcountry'].forEach(id => {
    const el = document.getElementById(id);
    if (el && !el.value.trim()) { el.classList.add('error'); valid = false; }
  });
  if (!plan.contact) {
    ['fcardnum','fexpiry','fcvc','fcardname'].forEach(id => {
      const el = document.getElementById(id);
      if (el && !el.value.trim()) { el.classList.add('error'); valid = false; }
    });
  }
  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '';

  setTimeout(() => { showSuccess(); }, 1600);
}

function showSuccess() {
  document.getElementById('checkoutBody').style.display = 'none';
  const s = document.getElementById('successScreen');
  s.classList.add('visible');

  document.getElementById('successTitle').textContent = plan.contact
    ? '¡Solicitud recibida!'
    : `Plan ${plan.name} activado`;

  document.getElementById('successMsg').textContent = plan.contact
    ? 'Recibimos tu solicitud para el plan Enterprise. Un miembro del equipo revisará tu caso y te contactará en menos de 24 horas.'
    : plan.trial
    ? `Tu prueba gratuita de 14 días del plan ${plan.name} está activa. No se realizará ningún cobro hasta que finalice el período de prueba.`
    : `Tu suscripción al plan ${plan.name} está activa. Recibirás las credenciales de acceso por correo.`;

  const steps = plan.contact
    ? [['Revisión', 'Nuestro equipo revisará tu caso y necesidades específicas.'],
       ['Propuesta', 'Te enviaremos una propuesta personalizada por correo y WhatsApp.'],
       ['Demo', 'Agendaremos una llamada de 30 min para mostrarte el producto.']]
    : [['Bienvenida', 'Recibirás un correo con tus credenciales de acceso en los próximos minutos.'],
       ['Configuración', 'Sube tu logo y colores para personalizar tu app (tarda 5 minutos).'],
       ['Primera propiedad', 'Publica tu primera propiedad y comparte el catálogo con tus clientes.']];

  document.getElementById('successSteps').innerHTML = steps.map(([t, d]) => `
    <div class="success-step">
      <div class="success-step-num">${steps.indexOf(steps.find(s=>s[0]===t))+1}</div>
      <div><strong>${t}:</strong> ${d}</div>
    </div>`).join('');
}

function toggleMobileSummary() {
  const bar = document.getElementById('mobileSummaryBar');
  const panel = document.getElementById('mobileSummaryPanel');
  bar.classList.toggle('open');
  panel.classList.toggle('open');
}

renderPage();
</script>
